<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurantes - Fibonacci</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:'Poppins',sans-serif;
padding:40px;
}

h1{
text-align:center;
font-family:'Playfair Display',serif;
margin-bottom:20px;
}

/* BARRA DE BUSQUEDA */

.search-container{
width:100%;
display:flex;
justify-content:center;
margin-bottom:40px;
}

.search-box{
width:500px;
max-width:90%;
padding:14px 20px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
background:#111;
color:white;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.search-box::placeholder{
color:#aaa;
}

/* CARDS RESTAURANTES */

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
width:280px;
height:360px;
border-radius:20px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.card-content{
position:absolute;
inset:0;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.card h2{
margin-bottom:10px;
font-family:'Playfair Display',serif;
}

.card p{
font-size:14px;
opacity:0.9;
}

.card button{
margin-top:10px;
padding:10px 24px;
border-radius:30px;
border:none;
cursor:pointer;
}

.back{
display:block;
margin:60px auto 0;
text-align:center;
background:white;
color:black;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
width:fit-content;
}

</style>
</head>

<body>

<h1>RESTAURANTES EN VILLAVICENCIO</h1>

<div class="search-container">
<input 
type="text" 
class="search-box"
id="searchInput"
placeholder="Buscar restaurante o comida..."
onkeyup="searchItems()"
>
</div>

<div class="cards" id="restaurantList">

<div class="card" data-name="pichaco carne parrilla carne asada hamburguesa"
style="background-image:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');">

<div class="card-content">
<h2>PICHACO</h2>
<p>Carne • Parrilla • Hamburguesas</p>
<button>Ver menú</button>
</div>

</div>


<div class="card" data-name="la esquina pizza pasta lasagna italiana"
style="background-image:url('https://images.unsplash.com/photo-1540189549336-e6e99c3679fe');">

<div class="card-content">
<h2>LA ESQUINA</h2>
<p>Pizza • Pasta • Comida italiana</p>
<button>Ver menú</button>
</div>

</div>


<div class="card" data-name="la morsa mariscos pescado camarones sushi"
style="background-image:url('https://images.unsplash.com/photo-1604909052743-94e838986d24');">

<div class="card-content">
<h2>LA MORSA</h2>
<p>Mariscos • Pescado • Sushi</p>
<button>Ver menú</button>
</div>

</div>

</div>

<a href="./index.html" class="back">Volver al inicio</a>

<script>

function searchItems(){

let input = document.getElementById("searchInput").value.toLowerCase();

let cards = document.querySelectorAll(".card");

cards.forEach(card => {

let name = card.getAttribute("data-name");

if(name.includes(input)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

}

</script>

</body>
</html>
