<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurantes - Fibonacci</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:'Poppins',sans-serif;
padding:40px;
}

h1{
text-align:center;
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
width:280px;
height:360px;
border-radius:20px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

.card-content{
position:absolute;
inset:0;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.card h2{
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.card p{
font-size:14px;
margin-bottom:12px;
opacity:0.9;
}

.card a{
text-decoration:none;
}

.card button{
padding:10px 24px;
border-radius:30px;
border:none;
cursor:pointer;
font-weight:500;
}

.back{
display:block;
margin:60px auto 0;
background:white;
color:black;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
width:fit-content;
}

</style>
</head>

<body>

<h1>RESTAURANTES EN VILLAVICENCIO</h1>

style="background-image:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');">

<p>Carne • Parrilla • Hamburguesas</p>

</a>

</div>
</div>

<div class="card-content">

<p>Pizza • Pasta • Italiana</p>

</a>

</div>
</div>

<!-- LA MORSA -->

<div class="card"

<div class="card-content">

<p>Mariscos • Pescado • Sushi</p>

</a>

</div>
</div>

</div>

</body>
</html>
